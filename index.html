<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Radar Lite - Nigeria</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }
        #map {
            height: 100vh;
            width: 100%;
        }
        .info-panel {
            position: absolute;
            top: 10px;
            right: 10px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
            max-width: 300px;
            z-index: 1000;
        }
        h1 {
            margin: 0 0 10px 0;
            font-size: 1.4em;
            color: #0366d6;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <div class="info-panel">
        <h1>Flight Radar Lite</h1>
        <p><strong>Live flights over Nigeria</strong></p>
        <p id="status">Loading flight data...</p>
        <small>Click on any plane marker for details</small>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
